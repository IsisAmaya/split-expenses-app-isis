name: Database CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/database/**"
      - "src/backend/alembic/**"
  workflow_dispatch:

jobs:
  validate-migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'splitwise' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'splitwise' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ vars.POSTGRES_USER || 'splitwise' }} -d ${{ vars.POSTGRES_DB || 'splitwise' }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: src/backend

    env:
      POSTGRES_DB: ${{ vars.POSTGRES_DB || 'splitwise' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'splitwise' }}
      DATABASE_URL: postgresql://${{ vars.POSTGRES_USER || 'splitwise' }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ vars.POSTGRES_DB || 'splitwise' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import socket
          import time

          host = "127.0.0.1"
          port = 5432

          for _ in range(60):
              try:
                  with socket.create_connection((host, port), timeout=1):
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("Postgres service did not become available in time.")
          PY

      - name: Run migrations
        run: alembic upgrade head

      - name: Verify migrations are reversible
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Check schema consistency
        run: alembic check
