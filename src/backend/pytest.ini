[pytest]
pythonpath = .
addopts = -v --color=yes --tb=short
testpaths = tests
norecursedirs = .git venv env .* _* build dist htmlcov alembic
markers =
    acceptance: pruebas de aceptación sobre la interfaz de usuario
    integration: pruebas de integración entre capas del backend
    smoke: pruebas de humo contra una aplicación desplegada
